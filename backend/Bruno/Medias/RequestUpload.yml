info:
  name: RequestUpload
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}api/medias/request-upload"
  body:
    type: json
    data: |-
      {
        "name": "document.pdf",
        "mimeType": "application/pdf"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
